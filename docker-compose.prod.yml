services:
  web:
    build: .
    container_name: ecommerce_backend_api_prod
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60 --access-logfile - --error-logfile -
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "True"
      COLLECT_STATIC: "True"
      DEBUG: "False"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=3).read()\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  celery_worker:
    build: .
    container_name: ecommerce_celery_worker_prod
    command: celery -A config worker --loglevel=info
    env_file:
      - .env
    environment:
      DEBUG: "False"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: .
    container_name: ecommerce_celery_beat_prod
    command: celery -A config beat --loglevel=info
    env_file:
      - .env
    environment:
      DEBUG: "False"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: ecommerce_postgres_prod
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: ecommerce_password
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis_prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_prod_data:
